<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeStrix AI - Marine Intelligence Platform</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      /* Deep Navy Base with subtle animated wave overlays */
      background: 
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%2314b8a6" fill-opacity="0.03" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,250.7C960,235,1056,181,1152,165.3C1248,149,1344,171,1392,181.3L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>'),
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%230ea5e9" fill-opacity="0.04" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,181.3C960,181,1056,139,1152,122.7C1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>'),
        radial-gradient(circle at top, #0f172a, #020617 70%);
      background-attachment: fixed;
      background-repeat: repeat-x, repeat-x, no-repeat;
      background-size: 2000px 30%, 2500px 40%, cover;
      background-position: 0 bottom, 0 bottom, center;
      color: #e2e8f0;
      min-height: 100vh;
      animation: ocean-waves 120s linear infinite;
    }

    @keyframes ocean-waves {
      from { background-position: 0 bottom, 0 bottom, center; }
      to { background-position: 2000px bottom, -2500px bottom, center; }
    }
    
    /* Ocean Glow Effect - Glassmorphism */
    .ocean-glow {
      background: linear-gradient(135deg, rgba(0, 153, 255, 0.1), rgba(0, 255, 204, 0.05));
      backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 255, 204, 0.1);
    }

    /* Soft Wave Divider */
    .wave-divider {
      background: linear-gradient(to right, #0ea5e9, #14b8a6);
      height: 2px;
      opacity: 0.3;
      width: 100%;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    #risk-map { 
      height: 300px; 
      width: 100%; 
      border-radius: 1rem; 
      border: 1px solid rgba(0, 255, 204, 0.1);
    }

    .leaflet-container {
      background: #020617 !important;
    }

    /* Transition animations */
    .fade-in {
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19",
    "react-dom/client": "https://esm.sh/react-dom@19/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "path": "https://esm.sh/path@^0.12.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <!-- Leaflet JS -->

</body>
</html>
